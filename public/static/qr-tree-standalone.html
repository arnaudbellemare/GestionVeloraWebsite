<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>QR — Gestion Velora</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background: #1c1c1c;
    }
    body.embed {
      overflow: hidden;
      height: 100%;
    }
    html.embed {
      height: 100%;
    }
    #root {
      min-height: 100vh;
    }
    body.embed #root {
      height: 100%;
      min-height: 0;
      overflow: hidden;
    }
    /*
      Footer iframe is a small square; bundle uses inline 100vw/100vh — override so the scene fills the frame.
    */
    body.embed #root > div:first-child {
      width: 100% !important;
      height: 100% !important;
      max-width: 100% !important;
      min-height: 0 !important;
    }
  </style>
  <script>
    (function () {
      try {
        var p = new URLSearchParams(location.search);
        if (p.get("embed") === "1") {
          document.documentElement.classList.add("embed");
          document.body.classList.add("embed");
        }
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script src="/static/qr-tree-standalone.bundle.js"></script>
</body>
</html>
